target: require_login.settings
login_path: /laci/log-in-to-laci
login_message: ''
login_destination: ''
requirements:
  request_path:
    id: request_path
    negate: true
    pages: '/cron/*'
  response_status:
    id: response_status
    negate: false
    status_codes: {  }
  'entity_bundle:node':
    id: 'entity_bundle:node'
    negate: true
    context_mapping:
      node: '@node.node_route_context:node'
    bundles:
      laci_login_page: laci_login_page
  'entity_bundle:taxonomy_term':
    id: 'entity_bundle:taxonomy_term'
    negate: false
    context_mapping:
      taxonomy_term: '@taxonomy_term.taxonomy_term_route_context:taxonomy_term'
    bundles: {  }
extra:
  include_403: true
  include_404: true
